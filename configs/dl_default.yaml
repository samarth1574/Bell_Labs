# dl_default.yaml
# Standard detector configuration mimicking Phase 1 default behavior.
model:
  backbone: "mobilenet_v3"
  use_density_head: false

nms:
  method: "hard"
  iou_threshold: 0.5
  score_thresh: 0.3
  sigma: 0.5  # Ignore for hard
  
anchors:
  use_custom_dense_anchors: false

dataset:
  batch_size: 4
  num_workers: 2
  prefetch_factor: 2
  use_flips: false
  use_jitter: false
  advanced_aug: "none"
  oversample_dense: false

training:
  weight_decay: 0.0001
  dropout: 0.0
  patience: 10
  focal_loss: false
